<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <!-- ============================================================
       NCR_PICKING — Proposed RUNTIME (Operator) Mode v2
       New screen that fills the gap noted in AGENT.md:
       "operator runtime validation with a real or simulated Localization cycle".
       Designed for 1920×1080 HMI on a shop floor, ≤ 2 m read distance.
       Single Now view, no nav distractions, oversized status,
       persistent RunBar at the bottom.
       ============================================================ -->
  <rect width="1920" height="1080" fill="#1a1c20"/>

  <!-- Top bar — minimal (project + cycle clock + mode toggle) -->
  <rect x="0" y="0" width="1920" height="64" fill="#0f1114"/>
  <text x="24" y="26" fill="#7a8898" font-size="12" letter-spacing="1.4">NCR PICKING · RUNTIME</text>
  <text x="24" y="50" fill="#e0e4ea" font-size="18" font-weight="700">project_alpha · localize_bin_top</text>

  <!-- Cycle clock -->
  <g transform="translate(880,12)">
    <text fill="#7a8898" font-size="11" letter-spacing="1.4">CYCLE</text>
    <text y="36" fill="#e0e4ea" font-size="28" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">#248</text>
    <text x="86" y="36" fill="#7a8898" font-size="16">·  2 s ago</text>
  </g>

  <!-- Mode toggle -->
  <g transform="translate(1240,18)">
    <rect width="260" height="32" rx="16" fill="#1a1c20" stroke="#3a3f48"/>
    <text x="68" y="22" text-anchor="middle" fill="#7a8898" font-size="13" font-weight="600">COMMISSION</text>
    <rect x="132" y="2" width="124" height="28" rx="14" fill="#e87c00"/>
    <text x="194" y="22" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">RUNTIME</text>
  </g>

  <!-- Connection chips -->
  <g transform="translate(1540,18)" font-size="13">
    <g><rect width="100" height="32" rx="16" fill="rgba(64,200,112,0.10)" stroke="#40c870"/><circle cx="16" cy="16" r="6" fill="#40c870"/><text x="30" y="21" fill="#40c870" font-weight="700">PLC</text></g>
    <g transform="translate(108,0)"><rect width="100" height="32" rx="16" fill="rgba(64,200,112,0.10)" stroke="#40c870"/><circle cx="16" cy="16" r="6" fill="#40c870"/><text x="30" y="21" fill="#40c870" font-weight="700">CAM</text></g>
    <g transform="translate(216,0)"><rect width="140" height="32" rx="16" fill="rgba(255,82,82,0.10)" stroke="#ff5252"/><circle cx="16" cy="16" r="6" fill="#ff5252"/><text x="30" y="21" fill="#ff5252" font-weight="700">OUTPUT 3/5</text></g>
  </g>

  <!-- ============== Hero: Live camera + giant status ============== -->
  <g transform="translate(24,80)">
    <rect width="1180" height="800" fill="#0f1114" stroke="#3a3f48" rx="8"/>
    <!-- header overlay -->
    <g transform="translate(20,16)">
      <text fill="#7a8898" font-size="13" letter-spacing="1.4">LIVE  ·  basler_top  ·  2048×1536</text>
    </g>

    <!-- Image content -->
    <g transform="translate(80,80)">
      <rect width="1020" height="640" fill="#1a1c20"/>
      <rect x="50" y="40" width="920" height="560" fill="#2c3038" stroke="#3a3f48"/>
      <!-- workspace ROI -->
      <rect x="50" y="40" width="920" height="560" fill="none" stroke="#e87c00" stroke-dasharray="8 6" stroke-width="2"/>
      <!-- detected -->
      <g fill="none" stroke="#3ac98a" stroke-width="3">
        <rect x="170" y="110" width="100" height="100" transform="rotate(8 220 160)"/>
        <rect x="410" y="160" width="100" height="100" transform="rotate(-12 460 210)"/>
        <rect x="660" y="110" width="100" height="100" transform="rotate(4 710 160)"/>
      </g>
      <rect x="310" y="380" width="100" height="100" fill="none" stroke="#ffb020" stroke-width="3" transform="rotate(22 360 430)"/>
      <g fill="#40c870" font-size="14" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">
        <text x="180" y="104">#1 · 0.94</text>
        <text x="420" y="154">#2 · 0.91</text>
        <text x="670" y="104">#3 · 0.88</text>
      </g>
      <text x="320" y="374" fill="#ffb020" font-size="14" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">#4 · 0.74 low</text>
    </g>

    <!-- Pause overlay (subtle, only when no live trigger) -->
    <g transform="translate(940,30)">
      <rect width="220" height="40" rx="20" fill="rgba(64,200,112,0.10)" stroke="#40c870"/>
      <circle cx="22" cy="20" r="6" fill="#40c870">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="40" y="26" fill="#40c870" font-size="14" font-weight="700">LIVE  ·  68 ms</text>
    </g>
  </g>

  <!-- ============== Right column: stacked KPIs + fault ============== -->
  <g transform="translate(1224,80)">
    <!-- Fault banner (large) -->
    <rect width="672" height="160" fill="rgba(255,82,82,0.10)" stroke="#ff5252" stroke-width="2" rx="8"/>
    <circle cx="40" cy="80" r="22" fill="#ff5252"/>
    <text x="40" y="88" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">!</text>
    <text x="76" y="50" fill="#ff5252" font-size="22" font-weight="700">FAULT 11 — VISION_OUTPUT_DOWN</text>
    <text x="76" y="76" fill="#e0e4ea" font-size="14">tcpip_server_01 socket reset 12 s ago · 3 of 5 retries used</text>
    <text x="76" y="98" fill="#7a8898" font-size="13">12 cycles buffered locally · cycle is currently blocked</text>
    <g transform="translate(76,114)">
      <rect width="160" height="36" rx="4" fill="#ff5252"/>
      <text x="80" y="23" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">RECONNECT NOW</text>
      <g transform="translate(170,0)">
        <rect width="160" height="36" rx="4" fill="transparent" stroke="#ff5252"/>
        <text x="80" y="23" text-anchor="middle" fill="#ff5252" font-size="13" font-weight="600">ACKNOWLEDGE</text>
      </g>
    </g>
  </g>

  <!-- KPI grid 2×2 -->
  <g transform="translate(1224,260)">
    <g>
      <rect width="328" height="180" fill="#22252a" stroke="#3a3f48" rx="8"/>
      <text x="20" y="28" fill="#7a8898" font-size="13" letter-spacing="1.4">DETECTED</text>
      <text x="20" y="106" fill="#e0e4ea" font-size="76" font-weight="700">4</text>
      <text x="20" y="140" fill="#40c870" font-size="14">▲ stable across 5 cycles</text>
      <polyline points="20,164 100,158 180,160 240,150 300,156" fill="none" stroke="#e87c00" stroke-width="2"/>
    </g>
    <g transform="translate(344,0)">
      <rect width="328" height="180" fill="#22252a" stroke="#ff5252" rx="8"/>
      <text x="20" y="28" fill="#ff5252" font-size="13" letter-spacing="1.4" font-weight="700">✕ NOT SENT</text>
      <text x="20" y="106" fill="#ff5252" font-size="76" font-weight="700">12</text>
      <text x="20" y="140" fill="#e0e4ea" font-size="14">buffered locally · output queue full</text>
      <text x="20" y="160" fill="#7a8898" font-size="12">first lost cycle = #237</text>
    </g>
    <g transform="translate(0,196)">
      <rect width="328" height="180" fill="#22252a" stroke="#3a3f48" rx="8"/>
      <text x="20" y="28" fill="#7a8898" font-size="13" letter-spacing="1.4">MATCH TIME</text>
      <text x="20" y="106" fill="#e0e4ea" font-size="76" font-weight="700">82<tspan font-size="32" fill="#7a8898"> ms</tspan></text>
      <rect x="20" y="124" width="288" height="10" fill="#1a1c20" rx="5"/>
      <rect x="20" y="124" width="200" height="10" fill="#40c870" rx="5"/>
      <text x="20" y="158" fill="#7a8898" font-size="12">target ≤ 120 ms · p95 104 ms</text>
    </g>
    <g transform="translate(344,196)">
      <rect width="328" height="180" fill="#22252a" stroke="#ffb020" rx="8"/>
      <text x="20" y="28" fill="#ffb020" font-size="13" letter-spacing="1.4" font-weight="700">! LOW SCORE</text>
      <text x="20" y="106" fill="#ffb020" font-size="76" font-weight="700">1</text>
      <text x="20" y="140" fill="#e0e4ea" font-size="14">pattern #4 · 2 cycles in a row</text>
      <text x="20" y="160" fill="#7a8898" font-size="12">consider re-lighting bin corner</text>
    </g>
  </g>

  <!-- Activity feed (right column, lower) -->
  <g transform="translate(1224,656)">
    <text fill="#7a8898" font-size="13" letter-spacing="1.4">ACTIVITY</text>
    <g transform="translate(0,16)">
      <rect width="672" height="224" fill="#22252a" stroke="#3a3f48" rx="8"/>
      <g transform="translate(16,16)" font-size="13">
        <g><rect width="96" height="22" rx="11" fill="rgba(255,82,82,0.10)" stroke="#ff5252"/><text x="48" y="15" text-anchor="middle" fill="#ff5252" font-weight="700">✕ FAULT</text><text x="108" y="15" fill="#e0e4ea">tcpip_server_01 socket reset</text><text x="600" y="15" text-anchor="end" fill="#7a8898" font-size="11">19:04:00</text></g>
        <g transform="translate(0,28)"><rect width="96" height="22" rx="11" fill="rgba(255,176,32,0.10)" stroke="#ffb020"/><text x="48" y="15" text-anchor="middle" fill="#ffb020" font-weight="700">! WARN</text><text x="108" y="15" fill="#e0e4ea">pattern #4 below threshold 0.74</text><text x="600" y="15" text-anchor="end" fill="#7a8898" font-size="11">19:04:09</text></g>
        <g transform="translate(0,56)"><rect width="96" height="22" rx="11" fill="rgba(64,200,112,0.10)" stroke="#40c870"/><text x="48" y="15" text-anchor="middle" fill="#40c870" font-weight="700">✓ OK</text><text x="108" y="15" fill="#e0e4ea">cycle 248 · 82 ms · 4 results</text><text x="600" y="15" text-anchor="end" fill="#7a8898" font-size="11">19:04:17</text></g>
        <g transform="translate(0,84)"><rect width="96" height="22" rx="11" fill="rgba(64,200,112,0.10)" stroke="#40c870"/><text x="48" y="15" text-anchor="middle" fill="#40c870" font-weight="700">✓ OK</text><text x="108" y="15" fill="#e0e4ea">cycle 247 · 76 ms · 4 results</text><text x="600" y="15" text-anchor="end" fill="#7a8898" font-size="11">19:03:51</text></g>
        <g transform="translate(0,112)"><rect width="96" height="22" rx="11" fill="rgba(64,168,224,0.10)" stroke="#40a8e0"/><text x="48" y="15" text-anchor="middle" fill="#40a8e0" font-weight="700">i INFO</text><text x="108" y="15" fill="#e0e4ea">commission → runtime by operator</text><text x="600" y="15" text-anchor="end" fill="#7a8898" font-size="11">19:00:00</text></g>
      </g>
    </g>
  </g>

  <!-- ============== RUN BAR (persistent footer) ============== -->
  <rect x="0" y="920" width="1920" height="160" fill="#0f1114"/>
  <line x1="0" y1="920" x2="1920" y2="920" stroke="#3a3f48"/>

  <g transform="translate(24,948)">
    <!-- Start (giant) -->
    <rect width="220" height="120" rx="12" fill="#3ac98a"/>
    <text x="110" y="58" text-anchor="middle" fill="#1a1c20" font-size="40" font-weight="700">▶</text>
    <text x="110" y="92" text-anchor="middle" fill="#1a1c20" font-size="16" font-weight="700">START CYCLE</text>
  </g>
  <g transform="translate(252,948)">
    <rect width="220" height="120" rx="12" fill="#2c3038" stroke="#3a3f48"/>
    <text x="110" y="58" text-anchor="middle" fill="#e0e4ea" font-size="40" font-weight="700">■</text>
    <text x="110" y="92" text-anchor="middle" fill="#e0e4ea" font-size="16" font-weight="700">STOP</text>
  </g>
  <g transform="translate(480,948)">
    <rect width="220" height="120" rx="12" fill="#7a1010"/>
    <text x="110" y="58" text-anchor="middle" fill="#ffffff" font-size="40" font-weight="700">⊗</text>
    <text x="110" y="92" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">E-STOP</text>
  </g>

  <!-- Live cycle progress -->
  <g transform="translate(740,956)">
    <text fill="#7a8898" font-size="13" letter-spacing="1.4">CURRENT CYCLE · PHASES</text>
    <g transform="translate(0,18)">
      <rect width="780" height="40" fill="#1a1c20" stroke="#3a3f48" rx="6"/>
      <rect width="160" height="40" fill="#40a8e0" rx="6"/>
      <rect x="160" width="280" height="40" fill="#3a9bd9"/>
      <rect x="440" width="200" height="40" fill="#e87c00"/>
      <rect x="640" width="60" height="40" fill="#a87de0" rx="6" opacity="0.4"/>
      <g fill="#1a1c20" font-size="13" font-weight="700">
        <text x="80" y="26" text-anchor="middle">TRIG</text>
        <text x="300" y="26" text-anchor="middle">CAPTURE</text>
        <text x="540" y="26" text-anchor="middle">MATCH</text>
        <text x="670" y="26" text-anchor="middle" fill="#ffffff">SEND…</text>
      </g>
    </g>
    <text y="86" fill="#7a8898" font-size="12">14 ms · 32 ms · 26 ms · pending (waiting on output)</text>
  </g>

  <!-- Right side of run bar: cycle counter + uptime -->
  <g transform="translate(1540,948)">
    <rect width="160" height="120" rx="8" fill="#22252a" stroke="#3a3f48"/>
    <text x="80" y="32" text-anchor="middle" fill="#7a8898" font-size="12" letter-spacing="1.4">CYCLES TODAY</text>
    <text x="80" y="80" text-anchor="middle" fill="#e0e4ea" font-size="42" font-weight="700">248</text>
    <text x="80" y="104" text-anchor="middle" fill="#7a8898" font-size="11">12 not sent</text>
  </g>
  <g transform="translate(1716,948)">
    <rect width="180" height="120" rx="8" fill="#22252a" stroke="#3a3f48"/>
    <text x="90" y="32" text-anchor="middle" fill="#7a8898" font-size="12" letter-spacing="1.4">UPTIME</text>
    <text x="90" y="80" text-anchor="middle" fill="#e0e4ea" font-size="36" font-weight="700">7h 24m</text>
    <text x="90" y="104" text-anchor="middle" fill="#7a8898" font-size="11">since 11:36</text>
  </g>
</svg>
